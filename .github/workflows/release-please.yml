name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Tags created by GITHUB_TOKEN do not reliably fan out into downstream
      # workflows, and npm trusted publishing must match publish.yml exactly.
      - name: Trigger Publish (npm)
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_REF: ${{ steps.release.outputs.tag_name }}
          WORKFLOW_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/publish.yml/dispatches" \
            -d "{\"ref\":\"${WORKFLOW_REF}\",\"inputs\":{\"action\":\"publish\",\"publish_ref\":\"${PUBLISH_REF}\"}}"
